<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Job Application Form</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

<style>

body{
background: linear-gradient(135deg,#007bff,#00c6ff);
font-family: Arial, sans-serif;
min-height:100vh;
padding:40px;
}

.container{
background:white;
padding:40px;
border-radius:10px;
box-shadow:0 10px 30px rgba(0,0,0,0.2);
}

h2{
color:#007bff;
font-weight:bold;
text-align:center;
margin-bottom:30px;
}

fieldset{
border:2px solid #007bff;
padding:20px;
margin-top:20px;
border-radius:8px;
}

legend{
font-weight:bold;
color:#007bff;
padding:0 10px;
}

textarea{
resize:none;
}

button{
margin-top:10px;
}

</style>

<script>

function validateForm(){

let name=document.getElementById("fullname").value;
let email=document.getElementById("email").value;
let phone=document.getElementById("telephone").value;

let interests=document.querySelectorAll('input[name="interest"]:checked');

if(name===""||email===""||phone===""){
alert("Please fill in all required fields");
return false;
}

if(interests.length===0){
alert("Please select at least one area of interest");
return false;
}

return true;

}

</script>

</head>


<body>

<div class="container">

<h2>Job Application Form</h2>

<form onsubmit="return validateForm()">

<!-- PERSONAL INFO -->

<fieldset>

<legend>Personal Information</legend>

<label class="form-label">Full Name</label>
<input type="text" id="fullname" class="form-control">

<label class="form-label mt-3">Email</label>
<input type="email" id="email" class="form-control">

<label class="form-label mt-3">Telephone</label>
<input type="text" id="telephone" class="form-control">

<label class="form-label mt-3">Physical Address</label>
<input type="text" class="form-control">

</fieldset>


<!-- POSITION INFO -->

<fieldset>

<legend>Position Information</legend>

<label class="form-label">Desired Job Title</label>

<select class="form-control">

<option>Account Executive</option>
<option>Business Development</option>
<option>Inside Sales</option>
<option>Sales Manager</option>
<option>VP Sales</option>

</select>

<div class="mt-3">

<label class="form-label">Employment Type</label>

<div class="form-check">
<input type="radio" name="employment" class="form-check-input">
<label class="form-check-label">Part-time Contract</label>
</div>

<div class="form-check">
<input type="radio" name="employment" class="form-check-input">
<label class="form-check-label">Part-time Permanent</label>
</div>

<div class="form-check">
<input type="radio" name="employment" class="form-check-input">
<label class="form-check-label">Full-time Contract</label>
</div>

<div class="form-check">
<input type="radio" name="employment" class="form-check-input">
<label class="form-check-label">Full-time Permanent</label>
</div>

</div>

</fieldset>


<!-- INTEREST -->

<fieldset>

<legend>Area of Interest</legend>

<div class="form-check">
<input type="checkbox" name="interest" class="form-check-input">
<label class="form-check-label">Account Executive</label>
</div>

<div class="form-check">
<input type="checkbox" name="interest" class="form-check-input">
<label class="form-check-label">Business Development</label>
</div>

<div class="form-check">
<input type="checkbox" name="interest" class="form-check-input">
<label class="form-check-label">Inside Sales</label>
</div>

<div class="form-check">
<input type="checkbox" name="interest" class="form-check-input">
<label class="form-check-label">Sales Manager</label>
</div>

<div class="form-check">
<input type="checkbox" name="interest" class="form-check-input">
<label class="form-check-label">VP Sales</label>
</div>

</fieldset>


<!-- RELOCATION -->

<fieldset>

<legend>Relocation</legend>

<div class="form-check">
<input type="radio" name="relocation" class="form-check-input">
<label class="form-check-label">Yes</label>
</div>

<div class="form-check">
<input type="radio" name="relocation" class="form-check-input">
<label class="form-check-label">No</label>
</div>

</fieldset>


<!-- MESSAGE -->

<div class="mt-4">

<label class="form-label">Why are you suitable for this role?</label>

<textarea class="form-control" rows="4"></textarea>

</div>


<!-- BUTTONS -->

<div class="mt-4 text-center">

<button type="submit" class="btn btn-primary">Submit</button>

<button type="reset" class="btn btn-secondary">Reset</button>

</div>

</form>

</div>

</body>
</html>
