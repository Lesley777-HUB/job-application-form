<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Job Application Form</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

<link rel="stylesheet" href="style.css">

<script>

function validateForm(){

let name = document.getElementById("fullname").value;
let email = document.getElementById("email").value;
let telephone = document.getElementById("telephone").value;

let interests = document.querySelectorAll('input[name="interest"]:checked');

if(name === "" || email === "" || telephone === ""){
alert("Please fill in all required fields.");
return false;
}

if(interests.length === 0){
alert("Please select at least one area of interest.");
return false;
}

return true;

}

</script>

</head>

<body>

<div class="container mt-5">

<h2 class="text-center mb-4">Job Application Form</h2>

<form onsubmit="return validateForm()">

<fieldset>

<legend>Personal Information</legend>

<label class="form-label">Full Name</label>
<input type="text" id="fullname" class="form-control">

<label class="form-label mt-2">Email</label>
<input type="email" id="email" class="form-control">

<label class="form-label mt-2">Telephone</label>
<input type="text" id="telephone" class="form-control">

<label class="form-label mt-2">Address</label>
<input type="text" class="form-control">

</fieldset>


<fieldset class="mt-4">

<legend>Position Information</legend>

<label class="form-label">Desired Job Title</label>

<select class="form-control">

<option>Account Executive</option>
<option>Business Development</option>
<option>Inside Sales</option>
<option>Sales Manager</option>
<option>VP Sales</option>

</select>

<div class="mt-3">

<label class="form-label">Employment Type</label>

<div class="form-check">
<input type="radio" class="form-check-input" name="employment">
<label class="form-check-label">Part-time contract</label>
</div>

<div class="form-check">
<input type="radio" class="form-check-input" name="employment">
<label class="form-check-label">Part-time permanent</label>
</div>

<div class="form-check">
<input type="radio" class="form-check-input" name="employment">
<label class="form-check-label">Full-time contract</label>
</div>

<div class="form-check">
<input type="radio" class="form-check-input" name="employment">
<label class="form-check-label">Full-time permanent</label>
</div>

</div>

</fieldset>


<fieldset class="mt-4">

<legend>Areas of Interest</legend>

<div class="form-check">
<input type="checkbox" class="form-check-input" name="interest">
<label class="form-check-label">Account Executive</label>
</div>

<div class="form-check">
<input type="checkbox" class="form-check-input" name="interest">
<label class="form-check-label">Business Development</label>
</div>

<div class="form-check">
<input type="checkbox" class="form-check-input" name="interest">
<label class="form-check-label">Inside Sales</label>
</div>

<div class="form-check">
<input type="checkbox" class="form-check-input" name="interest">
<label class="form-check-label">Sales Manager</label>
</div>

<div class="form-check">
<input type="checkbox" class="form-check-input" name="interest">
<label class="form-check-label">VP Sales</label>
</div>

</fieldset>


<fieldset class="mt-4">

<legend>Relocation</legend>

<div class="form-check">
<input type="radio" class="form-check-input" name="relocate">
<label class="form-check-label">Yes</label>
</div>

<div class="form-check">
<input type="radio" class="form-check-input" name="relocate">
<label class="form-check-label">No</label>
</div>

</fieldset>


<div class="mt-4">

<label class="form-label">Why are you suitable for this role?</label>

<textarea class="form-control" rows="4"></textarea>

</div>


<div class="mt-4">

<button type="submit" class="btn btn-primary">Submit</button>

<button type="reset" class="btn btn-secondary">Reset</button>

</div>

</form>

</div>

</body>
</html>
